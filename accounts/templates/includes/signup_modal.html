{% load static %}
<div class="modal fade signup-modal-root" id="signupModal" tabindex="-1" role="dialog" aria-labelledby="signupModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable signup-modal-dialog" role="document">
        <div class="modal-content border-0 signup-modal-sheet">
            <div class="modal-header border-0 pb-2 signup-modal-header">
                <h5 class="modal-title font-weight-bold" id="signupModalTitle">Sign Up</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body pt-0 px-4 pb-4">
                <div class="signup-page signup-modal-inner">
                    <div class="limiter">
                        <div class="container-login100">
                            <div class="wrap-login100 signup-modal-card">
                                <form class="signup-modal-form" method="post" action="{% url 'signup' %}">
                                    {% csrf_token %}
                                    <input type="hidden" name="signup_modal" value="1">
                                    <input type="hidden" name="next" value="{{ request.path }}">
                                    <a href="/oauth/login/facebook/" class="signup-modal-oauth signup-modal-oauth--fb">
                                        <i class="fab fa-facebook-square" aria-hidden="true"></i>
                                        Facebook
                                    </a>
                                    <a href="/oauth/login/google-oauth2/" class="signup-modal-oauth signup-modal-oauth--google">
                                        <img src="{% static 'img/icon/icon-google.png' %}" alt="Google">
                                        Google
                                    </a>
                                    <div class="w-100 text-center pt-2 pb-2 signup-modal-or">
                                        <p>— OR —</p>
                                        <span>Sign Up Using Email</span>
                                        <div class="error_msg text-center w-100">
                                            {% for field in signup_form %}
                                                {% for error in field.errors %}
                                                    <p class="mt-2 mb-2">{{ error }}</p>
                                                {% endfor %}
                                            {% endfor %}
                                        </div>
                                    </div>
                                    <div class="signup-modal-email-fields">
                                        <div class="wrap-input100 validate-input mb-2">
                                            <input class="input100" type="email" name="email" placeholder="Email" required autocomplete="email" value="{{ signup_form.email.value|default_if_none:'' }}">
                                        </div>
                                        <div class="wrap-input100 validate-input mb-2">
                                            <input class="input100" type="password" name="password" placeholder="Password" required autocomplete="new-password">
                                        </div>
                                        <div class="wrap-input100 validate-input mb-2">
                                            <input class="input100" type="password" name="password2" placeholder="Confirm Password" required autocomplete="new-password">
                                        </div>
                                    </div>
                                    <div class="signup-modal-submit-wrap signup-modal-submit-wrap--signup">
                                        <button class="signup-modal-submit" type="submit">
                                            Create Account
                                        </button>
                                    </div>
                                    <div class="w-100 text-center pt-3 signup-modal-footer">
                                        <span>Already a member?</span>
                                        <a href="#" class="auth-open-login-modal" role="button">Sign in now</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
