<script>
    function mountInitiativeGalleryGlide(selector) {
        var root = document.querySelector(selector);
        if (!root || typeof Glide === 'undefined') return null;
        var slideCount = root.querySelectorAll('.glide__slide').length;
        if (slideCount < 2) return null;
        var perView = Math.min(4, slideCount);
        var glide = new Glide(selector, {
            type: 'carousel',
            perView: perView,
            gap: 20,
            autoplay: 4000,
            hoverpause: true,
            animationDuration: 700,
            breakpoints: {
                1200: { perView: Math.min(3, slideCount) },
                768: { perView: Math.min(2, slideCount) },
                480: { perView: 1 },
            },
        });
        glide.mount();
        return glide;
    }

    function mountInitiativeCarousel(selector, perView) {
        var root = document.querySelector(selector);
        if (!root || typeof Glide === 'undefined') return null;
        var slideCount = root.querySelectorAll('.glide__slide').length;
        if (!slideCount) return null;
        var hasFewSlides = slideCount <= 3;
        var desktopPerView = Math.min(perView || 3, slideCount);
        var glide = new Glide(selector, {
            type: hasFewSlides ? 'slider' : 'carousel',
            perView: desktopPerView,
            gap: 20,
            bound: hasFewSlides,
            rewind: !hasFewSlides,
            autoplay: hasFewSlides ? false : 4000,
            hoverpause: true,
            breakpoints: {
                992: { perView: Math.min(2, slideCount) },
                576: { perView: 1 },
            },
        });
        glide.mount();
        return glide;
    }
</script>
